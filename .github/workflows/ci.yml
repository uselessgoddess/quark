name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# A new push makes the in-flight run of the same ref obsolete. Building wgpu
# takes ~12 minutes from cold, so not cancelling wastes real runner time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: fmt, clippy, test (CPU)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      # Default features means the ndarray backend: no GPU on a runner. The lint
      # pass is separate from the test pass so that a lint failure and a test
      # failure are distinguishable at a glance.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # Microtests only, per the issue: the heaviest of them trains a 2-layer toy
      # on ~600 tokens through a real Learner. This is wiring verification. The
      # reference run happens on the maintainer's GPU, not here.
      - name: Test
        run: cargo test --all-targets

      # The Rust tests above assert one half of the evaluation protocol against
      # experiments/protocol_fixture.json; this asserts the other. GPT-2's
      # baseline is measured by gpt2_baseline.py, so if the two halves drift the
      # difference would show up as a perplexity gap and be attributed to the
      # model -- exactly the mistake the comparison exists to avoid. Needs only
      # the standard library: --self-test loads no model. See docs/DESIGN.md §3.1.
      - name: Check the GPT-2 baseline agrees on the protocol
        run: python3 experiments/gpt2_baseline.py --self-test

      # The fixture pins the protocol on toy strings, and both sides can pass it
      # while still disagreeing about the real corpus -- that is not theoretical,
      # it is the bug this script was written for: both counted words and bytes
      # identically, but one summed them per document and the other counted them
      # on the whole file. Every fixture case passed. This runs the real binary
      # over a real file and diffs the sidecar against the Python. No model, no
      # GPU, ~5 seconds.
      - name: Check the shard denominators end to end
        run: ./experiments/check_shard_denominators.sh

  # The GPU backends, none of which a runner can execute: no runner has a GPU.
  # `check` at least guarantees these paths still compile -- otherwise they would
  # break silently and be discovered by the one person who can run them.
  #
  # `cuda` is deliberately absent: it needs a CUDA toolkit to build at all, so a
  # check job for it would test the runner image rather than this code. `rocm`
  # does not have that problem -- cubecl-hip-sys's build script falls back to
  # emitting no link flags when `hipconfig` is missing from PATH, which is why it
  # can be checked here without ROCm installed. That fallback is also why this
  # job must stay at `check`: `cargo build` of the binary gets as far as linking
  # and then fails with undefined `hip*` symbols. Compiling is the guarantee on
  # offer; linking and running are not.
  backends:
    name: check (${{ matrix.feature }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # wgpu is the backend the model is actually trained on. vulkan is the
        # same burn-wgpu crate with a SPIR-V compiler instead of WGSL, so it is
        # nearly free to check. rocm is a distinct stack and untested by anyone
        # here -- see Cargo.toml.
        feature: [wgpu, vulkan, rocm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check the ${{ matrix.feature }} backend compiles
        run: cargo check --no-default-features --features ${{ matrix.feature }} --all-targets
